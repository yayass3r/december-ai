# ═══════════════════════════════════════════════════════════════
# 🎨 RENDER DEPLOYMENT CONFIG
# Free tier: 750 hours/month
# ═══════════════════════════════════════════════════════════════

services:
  # ───────────────────────────────────────────────────────────────
  # Backend Service
  # ───────────────────────────────────────────────────────────────
  - type: web
    name: december-ai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /containers
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ZAI_API_KEY
        sync: false

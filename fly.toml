# ═══════════════════════════════════════════════════════════════
# ✈️ FLY.IO DEPLOYMENT CONFIG
# Free tier: 3 shared-cpu-1gb VMs
# ═══════════════════════════════════════════════════════════════

app = "december-ai"
primary_region = "sin"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "4000"

[[services]]
  internal_port = 4000
  protocol = "tcp"

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    grace_period = "1s"
    interval = "15s"
    restart_limit = 0
    timeout = "2s"

  [[services.http_checks]]
    interval = "30s"
    grace_period = "5s"
    method = "get"
    path = "/containers"
    protocol = "http"
    timeout = "5s"
